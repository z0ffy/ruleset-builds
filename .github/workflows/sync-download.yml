name: Sync and release download ruleset

on:
  schedule:
    - cron: '0 4 * * *'
      timezone: Asia/Shanghai
  workflow_dispatch:
    inputs:
      force_release:
        description: Publish even when the generated rules are unchanged
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-download.yml'
      - 'rules/local/download.yaml'
      - 'scripts/release-notes.ts'
      - 'scripts/sync-download.ts'

permissions:
  contents: write

concurrency:
  group: sync-download-ruleset
  cancel-in-progress: false

jobs:
  sync:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Sync upstream and local rules
        run: node scripts/sync-download.ts

      - name: Prepare build tool
        shell: bash
        run: |
          metadata="${RUNNER_TEMP}/mihomo-release.json"
          archive="${RUNNER_TEMP}/mihomo.gz"
          binary="${RUNNER_TEMP}/mihomo"

          gh api repos/MetaCubeX/mihomo/releases/latest > "${metadata}"
          version=$(jq --raw-output '.tag_name' "${metadata}")
          asset_name="mihomo-linux-amd64-${version}.gz"
          url=$(jq --raw-output --arg name "${asset_name}" \
            '.assets[] | select(.name == $name) | .browser_download_url' "${metadata}")
          digest=$(jq --raw-output --arg name "${asset_name}" \
            '.assets[] | select(.name == $name) | .digest' "${metadata}")

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid Mihomo version: ${version}" >&2
            exit 1
          fi

          if [[ -z "${url}" || ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Mihomo release asset or digest is unavailable: ${asset_name}" >&2
            exit 1
          fi

          curl --fail --location --retry 3 --output "${archive}" "${url}"
          echo "${digest#sha256:}  ${archive}" | sha256sum --check -
          gzip --decompress --stdout "${archive}" > "${binary}"
          chmod +x "${binary}"
          "${binary}" -v

      - name: Build release assets
        shell: bash
        run: |
          mkdir -p dist
          cp rules/domain/download.yaml dist/download.yaml
          "${RUNNER_TEMP}/mihomo" convert-ruleset domain yaml dist/download.yaml dist/download.mrs
          cd dist
          sha256sum download.yaml download.mrs > checksums.txt

      - name: Decide whether to publish
        id: state
        shell: bash
        run: |
          changed=false
          publish=false
          release_metadata="${RUNNER_TEMP}/current-release.json"

          if ! git diff --quiet -- rules/domain/download.yaml; then
            changed=true
          fi

          current_yaml_digest="sha256:$(sha256sum dist/download.yaml | cut -d ' ' -f 1)"
          current_mrs_digest="sha256:$(sha256sum dist/download.mrs | cut -d ' ' -f 1)"
          release_yaml_digest=""
          release_mrs_digest=""

          if gh api "repos/${GITHUB_REPOSITORY}/releases/latest" \
            > "${release_metadata}" 2>/dev/null; then
            release_yaml_digest=$(jq --raw-output \
              '.assets[] | select(.name == "download.yaml") | .digest // empty' \
              "${release_metadata}")
            release_mrs_digest=$(jq --raw-output \
              '.assets[] | select(.name == "download.mrs") | .digest // empty' \
              "${release_metadata}")
          fi

          if [[ "${current_yaml_digest}" != "${release_yaml_digest}" ||
                "${current_mrs_digest}" != "${release_mrs_digest}" ||
                '${{ inputs.force_release }}' == true ]]; then
            publish=true
          fi

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

      - name: Commit synchronized rules
        if: steps.state.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add rules/domain/download.yaml
          git commit -m 'chore(rules): sync download rules'
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Choose release version
        if: steps.state.outputs.publish == 'true'
        id: version
        shell: bash
        run: |
          base="v$(TZ=Asia/Shanghai date +%Y.%m.%d)"
          number=1

          while git rev-parse --verify --quiet "refs/tags/${base}.${number}" >/dev/null; do
            number=$((number + 1))
          done

          echo "tag=${base}.${number}" >> "${GITHUB_OUTPUT}"

      - name: Prepare release notes
        if: steps.state.outputs.publish == 'true'
        shell: bash
        run: |
          release_notes="${RUNNER_TEMP}/release-notes.md"
          previous_directory="${RUNNER_TEMP}/previous-release"
          previous_arguments=()
          release_metadata="${RUNNER_TEMP}/current-release.json"

          if jq --exit-status \
            '.assets[]? | select(.name == "download.yaml")' \
            "${release_metadata}" >/dev/null 2>&1; then
            previous_tag=$(jq --raw-output '.tag_name' "${release_metadata}")
            mkdir -p "${previous_directory}"
            gh release download "${previous_tag}" \
              --pattern download.yaml \
              --dir "${previous_directory}"
            previous_arguments=(--previous "${previous_directory}/download.yaml")
          fi

          node scripts/release-notes.ts \
            "${previous_arguments[@]}" \
            --current dist/download.yaml \
            --output "${release_notes}"

          cat "${release_notes}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Publish GitHub Release
        if: steps.state.outputs.publish == 'true'
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'

          gh release create "${tag}" \
            dist/download.yaml \
            dist/download.mrs \
            dist/checksums.txt \
            --target "$(git rev-parse HEAD)" \
            --title "${tag}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md" \
            --latest
